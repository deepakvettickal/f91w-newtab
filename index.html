<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F-91W</title>
  <link rel="preload" href="fonts/DSEG7Classic-Bold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/DSEG14Classic-Bold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="lcd">
    <div class="lcd-inner" id="lcd">

      <!-- CASIO / F-91W header -->
      <div class="head">
        <span class="brand">CASIO</span>
        <span class="model">F-91W</span>
      </div>

      <!-- upper label row -->
      <div class="labelrow top">
        <span class="light-group">
          <span class="lbl action" id="lightBtn"><span class="arw">&#9664;</span> LIGHT/RESET</span>
          <input type="range" class="bright" id="bright" min="10" max="100" value="70" title="Light brightness" />
        </span>
        <span class="lbl chrono">ALARM CHRONOGRAPH</span>
      </div>

      <!-- light-gradient pickers (edit mode) — up top, near the LIGHT button -->
      <div class="edit-top" id="editTop">
        <div class="eb-row"><span class="eb-label">LIGHT &#9650;</span><div class="swatches" data-target="top"></div></div>
        <div class="eb-row"><span class="eb-label">LIGHT &#9660;</span><div class="swatches" data-target="bottom"></div></div>
      </div>

      <!-- the LCD screen — every cell is a FIXED position; only lit values change -->
      <div class="screen" id="screen">
        <div class="screen-top">
          <span class="timemode" id="timemode">24H</span>
          <span class="cell weekday dseg14" id="weekdayCell">
            <span class="ghost">~~</span>
            <span class="win"><span class="val" id="weekday">SA</span></span>
          </span>
          <span class="cell daynum dseg7 right">
            <span class="ghost">88</span>
            <span class="win"><span class="val" id="daynum">4</span></span>
          </span>
        </div>
        <div class="screen-main">
          <span class="hm dseg7" data-ghost="88:88"><span class="g" id="g1">16</span><span class="sep">:</span><span class="g" id="g2">59</span></span>
          <span class="cell seconds dseg7 right">
            <span class="ghost">88</span>
            <span class="win"><span class="val" id="seconds">13</span></span>
          </span>
        </div>
      </div>

      <!-- lower label row -->
      <div class="labelrow bottom">
        <span class="lbl action" id="modeBtn"><span class="arw">&#9664;</span> MODE</span>
        <span class="lbl action" id="altBtn">START-STOP/24HR <span class="arw">&#9654;</span></span>
      </div>

      <!-- colour edit bar (shown in edit mode, before footer so the footer's
           reserved space keeps the layout from shifting) -->
      <div class="edit-bar" id="editBar">
        <div class="eb-grid">
          <div class="eb-row"><span class="eb-label">DIGITS</span><div class="swatches" data-target="ink"></div></div>
          <div class="eb-row"><span class="eb-label">BORDER</span><div class="swatches" data-target="border"></div></div>
        </div>
        <div class="eb-actions">
          <button class="edit-reset" id="editReset" title="Reset all colours">RESET</button>
          <button class="edit-x" id="editX" title="Done">&#10005;</button>
        </div>
      </div>

      <!-- footer (normal mode) -->
      <div class="foot">
        <span class="lbl">WATER</span>
        <span class="wr-box" id="wrBox" title="Colour edit"><span>W<span class="r">R</span></span></span>
        <span class="lbl">RESIST</span>
      </div>

      <!-- contextual hint (stopwatch / timer editing) -->
      <div class="hint" id="hint"></div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
